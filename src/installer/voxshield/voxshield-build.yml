# VoxShield Desktop — macOS & Linux Build & Release
# Copy this file to: .github/workflows/voxshield-build.yml
# (GitHub Actions workflows cannot be edited from the app builder)
#
# Triggers:
#   - Push a tag matching shield-v* (e.g. shield-v3.0.1) → builds + creates GitHub Release
#   - Manual dispatch from the Actions tab

name: VoxShield Desktop — Build & Release

on:
  push:
    tags: ['shield-v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            build_target: mac
            artifact_name: VoxShield-macOS
          - os: ubuntu-latest
            build_target: linux
            artifact_name: VoxShield-Linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies
        run: npm install

      - name: Build Vite frontend
        run: npm run build

      - name: Install electron dependencies
        run: npm install
        working-directory: src/electron

      - name: Copy dist to electron directory
        run: |
          rm -rf src/electron/dist
          cp -r dist src/electron/dist

      - name: Build ${{ matrix.build_target }} installer
        run: npx electron-builder --${{ matrix.build_target }}
        working-directory: src/electron
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          BASE44_APP_ID: 69c84f61d5543b54fe26e1e5
          # macOS code signing (optional — leave empty for unsigned builds)
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Make AppImage executable (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: find src/installer/voxshield/output -name "*.AppImage" -exec chmod +x {} \;

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: src/installer/voxshield/output

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/shield-v')
        uses: softprops/action-gh-release@v2
        with:
          name: VoxShield Desktop ${{ github.ref_name }}
          body: |
            ## VoxShield Business Security ${{ github.ref_name }}

            ### Features
            - Unified authentication with voxvpn.net / VoxShield dashboard
            - OS-encrypted token storage (macOS Keychain / Linux encrypted config)
            - DNS filtering with malware & phishing protection
            - Kill switch, auto-start, system tray
            - Heartbeat subscription enforcement
            - Session lifecycle (start / end / heartbeat) fully wired to live backend

            ### Install
            - **macOS**: Download `.dmg`, drag to Applications
            - **Linux**: Download `.AppImage`, `chmod +x` and run
          files: src/installer/voxshield/output/*
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v2
        with:
          payload: |
            {
              "text": "❌ VoxShield desktop build failed on *${{ matrix.os }}* — <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}