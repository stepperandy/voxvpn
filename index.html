<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="https://media.base44.com/images/public/69c84f61d5543b54fe26e1e5/13431de73_VoxICON.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json" />
    <title>Base44 APP</title>
  </head>
  <body>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        console.log("Error caught:", message);
        document.body.innerHTML = `
          <div style="padding:20px;text-align:center;color:white;background:#0b1220;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;">
            <h2>VoxVPN</h2>
            <p>App recovered from an error. Please continue.</p>
            <button onclick="location.reload()" style="padding:10px 24px;background:#0ea5ff;color:#000;border:none;border-radius:8px;font-weight:bold;cursor:pointer;">Reload</button>
          </div>
        `;
      };
    </script>
    <div id="appLoader" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0b1220;color:white;display:flex;align-items:center;justify-content:center;z-index:9999;font-size:18px;">
      VoxVPN is loading...
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.addEventListener('load', function() {
        document.getElementById('appLoader').style.display = 'none';
      });
      setTimeout(() => {
        const loader = document.getElementById('appLoader');
        if (loader) loader.style.display = 'none';
      }, 5000);
    </script>
  </body>
</html>
